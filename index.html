<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quark Finance</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #07020F; height: 100%; overflow: hidden; }
  body { font-family: 'Geist', system-ui, sans-serif; color: #F4ECFF; }
  #root { width: 100%; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel" src="screens3.jsx"></script>
<script type="text/babel" src="interactive.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "bgIntensity": 1.1
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.setAttribute('data-density', tweaks.density === 'analyst' ? 'dense' : 'comfortable');
    document.documentElement.style.setProperty('--q-bg-intensity', tweaks.bgIntensity);
  }, [tweaks.density, tweaks.bgIntensity]);

  return (
    <>
      <QLangProvider>
        <QToastProvider>
          <QuarkRoot tweaks={tweaks} />
        </QToastProvider>
      </QLangProvider>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Display">
          <TweakRadio
            label="Density"
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'comfortable', label: 'Comfortable' },
              { value: 'analyst',     label: 'Quantum Analyst' },
            ]}
          />
          <TweakSlider
            label="Background intensity"
            value={tweaks.bgIntensity}
            onChange={(v) => setTweak('bgIntensity', v)}
            min={0} max={1.6} step={0.1}
            format={(v) => v.toFixed(1) + 'x'}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
